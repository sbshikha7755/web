<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .main-box {
            width: 200px;
            height: 200px;
            border: 2px solid grey;
            background-color: antiquewhite;
            margin: 10px;
            display: flex;
            font-size: xx-large;
            flex-direction: row;
            justify-content: center;
        }

        .card {
            margin: 10PX;
            background-color: aqua;
            height: 100px;
            width: 100px;
        }
        .main-box-2{
            width: 300px;
            height: 300px;
            border:2px solid green;
            background-color: blueviolet;
            margin: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex-wrap: nowrap;
            flex-wrap: wrap-reverse;
            justify-content: center;
            justify-content: flex-start;
            justify-content: flex-end;
            /* justify-content: space-around; */
            justify-content: space-between;
            /* justify-content: space-evenly; */
            text-align: center;
        }
        .card-2{
            width: 120px;
            height:90px ;
            border: 2px solid;
            background-color: burlywood;
            font-style: italic;
            font-size: larger;
        }
        img{
            height: 75px;
            width: 90px;
            border-radius: 20px;
            border: 2px solid rgb(54, 54, 54);
            box-shadow:0px 2px 0px 2px grey ;
        }



    </style>
</head>

<body>
    <h1>Flex</h1>
    <div class="main-box">
        <div class="card">1</div>
        <div class="card">2</div>
        <div class="card">3</div>

    </div>
       <h1>Flex2</h1>
    <div class="main-box-2">
        <div class="card-2"><img src="../images/email.png" alt=""></div>
        <div class="card-2">I will learnt JAVA language next month</div>
        <div class="card-2">I have complete maximum CSS</div>
           <div class="card-2"><img src="../images/insta.png" alt=""></div>
        <div class="card-2"><img src="../images/dplan.png" alt=""></div>
        <div class="card-2">I have completed HTML language</div>

    </div>


</body>

</html>

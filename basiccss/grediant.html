<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .cont {
        display: grid;
        background-color: brown;
        grid-template-columns: 100px 50px 80px;
        grid-template-rows: 200px 100px 50px 70px;

    }

    .box {
        background-color: rgb(177, 112, 238);
        border: 2px solid rgb(97, 85, 85);
    }

    .cont2 {
        display: grid;
        background-color: chartreuse;
        height: 500px;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
        text-align: center;
        justify-content: space-between;
        gap: 10px;

    }

    .box2 {
        background-color: rgb(145, 94, 119);
        border: 1px solid;
    }

    .cont3 {
        height: 400px;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: 30px 1fr 30px;
        display: grid;
        text-align: center;
        background-color: lightpink;
    }

    #header {
        grid-column-start: 1;
        grid-column-end: 5;
    }

    #footer {
        grid-column: 1/5;
    }

    #content {
        grid-column-start: 2;
        grid-column-end: 3;
    }
</style>

<body>
    <h1>Grid</h1>
    <div class="cont">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
        <div class="box">box4</div>
        <div class="box">box5</div>
        <div class="box">box6</div>
        <div class="box">box7</div>
        <div class="box">box8</div>
    </div>

    <h1>Repeat and Fractional Unit</h1>
    <div class="cont2">
        <div class="box2">box1</div>
        <div class="box2">box2</div>
        <div class="box2">box3</div>
        <div class="box2">box4</div>
        <div class="box2">box5</div>
        <div class="box2">box6</div>
        <div class="box2">box7</div>
        <div class="box2">box8</div>
    </div>

    <h1>Grid Colimn Starts and Ends / Grid Row Starts and Ends</h1>
    <div class="cont3">
        <div class="box2" id="header">box1</div>
        <div class="box2" id="menu">box2</div>
        <div class="box2" id="content">box3</div>
        <div class="box2" id="sidebar">box4</div>
        <div class="box2" id="footer">box5</div>
    </div>
</body>

</html>
